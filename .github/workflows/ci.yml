name: LaRuche CI

on:
  push:
    branches: ["main", "feat/**", "fix/**"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Syntax Check ─────────────────────────────────────────────────────────────
  lint:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - run: npm ci

      - name: Vérifier syntaxe src/
        run: |
          failed=0
          for f in src/*.js src/**/*.js; do
            [ -f "$f" ] || continue
            node --check "$f" && echo "✅ $f" || { echo "❌ $f"; failed=1; }
          done
          exit $failed

      - name: Vérifier syntaxe mcp_servers/
        run: |
          for f in mcp_servers/*.js; do
            [ -f "$f" ] || continue
            node --check "$f" && echo "✅ $f" || echo "⚠️  $f"
          done

      - name: Valider config JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('package.json'))"
          echo "✅ package.json valide"

  # ─── Tests Smoke ──────────────────────────────────────────────────────────────
  test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - run: npm ci

      - name: Smoke tests
        run: node test/smoke.js
        env:
          NODE_ENV: test
          TELEGRAM_BOT_TOKEN: "test-token-ci"
          ADMIN_TELEGRAM_ID: "123456789"
          OLLAMA_HOST: "http://localhost:11434"

  # ─── Sécurité ─────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Détecter les tokens Telegram exposés
        run: |
          if grep -rE "bot[0-9]{8,}:[A-Za-z0-9_-]{35,}" \
            --include="*.js" --include="*.ts" --include="*.json" \
            --exclude-dir=node_modules . 2>/dev/null; then
            echo "❌ Token Telegram potentiellement exposé !"
            exit 1
          fi
          echo "✅ Pas de tokens détectés"

      - name: Détecter les clés API
        run: |
          if grep -rE "(sk-[a-zA-Z0-9]{32,})" \
            --include="*.js" --include="*.ts" \
            --exclude-dir=node_modules . 2>/dev/null; then
            echo "❌ Clé API potentiellement exposée !"
            exit 1
          fi
          echo "✅ Pas de clés API détectées"

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high || true

  # ─── Résumé CI ────────────────────────────────────────────────────────────────
  ci-ok:
    name: CI ✅
    runs-on: ubuntu-latest
    needs: [lint, security]
    if: always()
    steps:
      - name: Résultat
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" || "${{ needs.security.result }}" == "failure" ]]; then
            echo "❌ CI échouée"
            exit 1
          fi
          echo "✅ Tous les checks passés"
