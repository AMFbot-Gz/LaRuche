version: "3.9"

# Project Chimera — Stack locale complète
# Usage: docker compose -f infra/docker/docker-compose.yml up -d

networks:
  chimera-net:
    driver: bridge

volumes:
  chromadb-data:
  redis-data:
  ollama-data:

x-python-agent: &python-agent
  build:
    context: ../../agents
    dockerfile: Dockerfile.agent
  environment:
    - CHIMERA_SECRET=${CHIMERA_SECRET}
    - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    - OLLAMA_HOST=http://ollama:11434
    - CHROMADB_HOST=chromadb
    - CHROMADB_PORT=8000
  networks: [chimera-net]
  restart: unless-stopped
  depends_on:
    - chromadb
    - ollama

services:

  # ─── Queen Node.js ─────────────────────────────────────
  queen:
    build:
      context: ../../apps/queen
      dockerfile: Dockerfile
    ports:
      - "${QUEEN_PORT:-3000}:3000"
      - "${HUD_PORT:-9001}:9001"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - CHIMERA_SECRET=${CHIMERA_SECRET}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ADMIN_TELEGRAM_ID=${ADMIN_TELEGRAM_ID}
      - STANDALONE_MODE=${STANDALONE_MODE:-true}
      - OLLAMA_HOST=http://ollama:11434
    networks: [chimera-net]
    restart: unless-stopped
    depends_on:
      - agent-orchestration
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Dashboard Next.js ─────────────────────────────────
  dashboard:
    build:
      context: ../../apps/dashboard
      dockerfile: Dockerfile
    ports:
      - "${DASHBOARD_PORT:-3001}:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://queen:3000
      - NEXT_PUBLIC_WS_URL=ws://queen:3000
    networks: [chimera-net]
    restart: unless-stopped

  # ─── Gateway Multi-canaux ──────────────────────────────
  gateway:
    build:
      context: ../../apps/gateway
      dockerfile: Dockerfile
    ports:
      - "${GATEWAY_PORT:-8100}:8100"
    environment:
      - CHIMERA_SECRET=${CHIMERA_SECRET}
      - QUEEN_URL=http://queen:3000
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - REDIS_URL=redis://redis:6379
    networks: [chimera-net]
    restart: unless-stopped
    depends_on: [redis]

  # ─── Agents Python ─────────────────────────────────────
  agent-orchestration:
    <<: *python-agent
    ports: ["8001:8001"]
    environment:
      - PORT=8001
      - CHIMERA_SECRET=${CHIMERA_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_HOST=http://ollama:11434

  agent-perception:
    <<: *python-agent
    ports: ["8002:8002"]
    environment:
      - PORT=8002
    volumes:
      - /tmp/chimera-screenshots:/tmp/screenshots

  agent-brain:
    <<: *python-agent
    ports: ["8003:8003"]
    environment:
      - PORT=8003
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_HOST=http://ollama:11434

  agent-executor:
    <<: *python-agent
    ports: ["8004:8004"]
    environment:
      - PORT=8004
    deploy:
      replicas: 2

  agent-evolution:
    <<: *python-agent
    ports: ["8005:8005"]
    environment:
      - PORT=8005
      - GITHUB_TOKEN=${GITHUB_TOKEN}

  agent-memory:
    <<: *python-agent
    ports: ["8006:8006"]
    environment:
      - PORT=8006
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
    volumes:
      - chromadb-data:/data/vector_store

  agent-mcp-bridge:
    <<: *python-agent
    ports: ["8007:8007"]
    environment:
      - PORT=8007
      - QUEEN_URL=http://queen:3000

  # ─── Infrastructure ────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes:
      - ollama-data:/root/.ollama
    networks: [chimera-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    ports: ["8200:8000"]
    volumes:
      - chromadb-data:/chroma/chroma
    networks: [chimera-net]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes:
      - redis-data:/data
    networks: [chimera-net]
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
