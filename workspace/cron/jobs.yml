# LaRuche Cron Jobs
# Format: standard cron expression
# Agent: which agent executes this job

version: "1.0"

jobs:
  - id: daily_cleanup
    name: "Nettoyage quotidien"
    schedule: "0 3 * * *"
    agent: devops
    action: |
      Purge les fichiers temporaires dans .laruche/temp/
      Rotation des logs de plus de 24h
      Purge des snapshots rollback de plus de 7 jours
    enabled: true

  - id: hourly_health
    name: "Health check horaire"
    schedule: "0 * * * *"
    agent: devops
    action: |
      Vérifie que Ollama répond sur http://localhost:11434
      Vérifie l'espace disque disponible
      Alerte Telegram si problème détecté
    enabled: true

  - id: regression_tests
    name: "Tests de régression nocturnes"
    schedule: "0 2 * * *"
    agent: devops
    action: |
      node test/smoke.js
    enabled: true

  - id: morning_briefing
    name: "Briefing matinal"
    schedule: "0 9 * * 1-5"
    agent: devops
    action: |
      Lire les logs d'hier et envoyer un résumé des missions exécutées
    enabled: false

  - id: weekly_memory
    name: "Consolidation mémoire hebdo"
    schedule: "0 2 * * 0"
    agent: builder
    action: |
      Consolider les entrées de workspace/memory/MEMORY.md
      Supprimer les doublons et compresser les anciens logs de session
    enabled: false
